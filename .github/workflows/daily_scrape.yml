name: BHH Data Scraper

on:
  schedule:
    - cron: '0 13 * * *' # Tự động chạy lúc 20:00 giờ VN hằng ngày
  workflow_dispatch: # Nút bấm chạy thủ công trên iPhone

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code ve may ao
        uses: actions/checkout@v4 # Đã nâng cấp từ v3 lên v4

      - name: Cai dat Python 3.12
        uses: actions/setup-python@v5 # Đã nâng cấp từ v4 lên v5
        with:
          python-version: '3.12'

      - name: Cai dat thu vien
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Chay code cao du lieu
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
        run: python diendulieu_bhh.py
